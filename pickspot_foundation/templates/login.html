{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto px-4 pt-12 pb-20">

  <!-- Header -->
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🐱</div>
    <h1 class="text-[#131086] font-black text-3xl">
      Halo, <span class="text-[#E44E9A]">PickSpotter!</span>
    </h1>
    <p class="text-gray-400 text-sm mt-1">Login dulu buat nemuin spotmu 🗺️</p>
  </div>

  <!-- Form -->
  <form method="POST" class="space-y-4">
    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Email</label>
      <input type="email" name="email" required placeholder="email@kamu.com"
             class="w-full bg-white border-2 border-gray-100 rounded-2xl px-4 py-3.5 text-sm
                    text-[#131086] placeholder-gray-300
                    focus:border-[#E44E9A] focus:outline-none transition">
    </div>
    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Password</label>
      <input type="password" name="password" required placeholder="••••••••"
             class="w-full bg-white border-2 border-gray-100 rounded-2xl px-4 py-3.5 text-sm
                    text-[#131086] placeholder-gray-300
                    focus:border-[#E44E9A] focus:outline-none transition">
    </div>

    <button type="submit"
            class="w-full bg-[#131086] text-white font-black py-4 rounded-2xl text-base
                   hover:bg-[#E44E9A] active:scale-95 transition-all mt-2 shadow-lg">
      Login 🚀
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Belum punya akun?
    <a href="/register" class="text-[#E44E9A] font-black hover:underline">Daftar Sekarang</a>
  </p>

  <!-- Dev hint -->
  <div class="mt-8 bg-[#131086]/5 rounded-2xl p-4 text-xs text-gray-400 space-y-1">
    <p class="font-bold text-[#131086] mb-1">🔑 Akun Default (dev)</p>
    <p>Admin : admin@pickspot.id / admin123</p>
    <p>Staff  : staff@pickspot.id / staff123</p>
  </div>
</div>
{% endblock %}
