{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto px-4 pt-12 pb-20">

  <div class="text-center mb-8">
    <div class="text-5xl mb-3">✨</div>
    <h1 class="text-[#131086] font-black text-3xl">
      Gabung <span class="text-[#E44E9A]">PickSpot!</span>
    </h1>
    <p class="text-gray-400 text-sm mt-1">Daftarkan diri buat mulai hunting spot keren 🏪</p>
  </div>

  <form method="POST" class="space-y-4">
    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Nama Lengkap</label>
      <input type="text" name="nama" required placeholder="Nama Kamu"
             class="w-full bg-white border-2 border-gray-100 rounded-2xl px-4 py-3.5 text-sm
                    text-[#131086] placeholder-gray-300
                    focus:border-[#E44E9A] focus:outline-none transition">
    </div>
    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Email</label>
      <input type="email" name="email" required placeholder="email@kamu.com"
             class="w-full bg-white border-2 border-gray-100 rounded-2xl px-4 py-3.5 text-sm
                    text-[#131086] placeholder-gray-300
                    focus:border-[#E44E9A] focus:outline-none transition">
    </div>
    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Password</label>
      <input type="password" name="password" required minlength="8" placeholder="Min. 8 karakter"
             class="w-full bg-white border-2 border-gray-100 rounded-2xl px-4 py-3.5 text-sm
                    text-[#131086] placeholder-gray-300
                    focus:border-[#E44E9A] focus:outline-none transition">
    </div>

    <button type="submit"
            class="w-full bg-[#E44E9A] text-white font-black py-4 rounded-2xl text-base
                   hover:bg-[#131086] active:scale-95 transition-all mt-2 shadow-lg">
      Daftar Sekarang 🗺️
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Sudah punya akun?
    <a href="/login" class="text-[#131086] font-black hover:underline">Login</a>
  </p>
</div>
{% endblock %}
