{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-6 pb-20">

  <div class="flex items-center gap-3 mb-6">
    <a href="/dashboard" class="text-[#E44E9A] font-black text-sm hover:underline">← Back</a>
    <h1 class="text-[#131086] font-black text-2xl">Edit Spot ✏️</h1>
  </div>

  <form method="POST" class="bg-white rounded-3xl p-6 shadow-sm space-y-5">

    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Nama Spot <span class="text-[#E44E9A]">*</span></label>
      <input type="text" name="nama_spot" required value="{{ spot.nama_spot }}"
             class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm
                    focus:border-[#E44E9A] focus:outline-none transition text-[#131086]">
    </div>

    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Deskripsi</label>
      <textarea name="deskripsi" rows="3"
                class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm resize-none
                       focus:border-[#E44E9A] focus:outline-none transition text-[#131086]">{{ spot.deskripsi }}</textarea>
    </div>

    <div>
      <label class="text-[#131086] font-black text-sm block mb-1.5">Lokasi <span class="text-[#E44E9A]">*</span></label>
      <input type="text" name="lokasi" required value="{{ spot.lokasi }}"
             class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm
                    focus:border-[#E44E9A] focus:outline-none transition text-[#131086]">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-[#131086] font-black text-sm block mb-1.5">Harga Estimasi (Rp)</label>
        <input type="number" name="harga_estimasi" required min="0" value="{{ spot.harga_estimasi }}"
               class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm
                      focus:border-[#E44E9A] focus:outline-none transition text-[#131086]">
      </div>
      <div>
        <label class="text-[#131086] font-black text-sm block mb-1.5">Stok Booking</label>
        <input type="number" name="stok_booking" required min="0" value="{{ spot.stok_booking }}"
               class="w-full border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm
                      focus:border-[#E44E9A] focus:outline-none transition text-[#131086]">
      </div>
    </div>

    <button type="submit"
            class="w-full bg-[#131086] text-white font-black py-4 rounded-2xl text-base
                   hover:bg-[#E44E9A] active:scale-95 transition-all shadow-lg">
      Update Spot 📍
    </button>
  </form>
</div>
{% endblock %}
